<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/hg-communication-design-system-e7295788-beb5-450f-a12b-213eea38d73b/styles.css">
  <style>.pagehero-crumb:hover{ color:var(--color-brand-press) !important; }</style>
</helmet>
<section style="position:relative; overflow:hidden; background:linear-gradient(180deg, var(--green-50) 0%, var(--surface-card) 100%); border-bottom:1px solid var(--border-subtle);">
  <div style="position:absolute; inset:0; background-image:radial-gradient(circle, rgba(0,168,80,0.10) 1.4px, transparent 1.5px); background-size:30px 30px; opacity:0.7;"></div>
  <img src="assets/logo/hg-monogram-green.png" alt="" style="position:absolute; right:-40px; top:50%; transform:translateY(-50%); width:min(360px,34vw); opacity:0.10; pointer-events:none;">
  <div style="position:relative; max-width:1200px; margin:0 auto; padding:clamp(40px,6vw,72px) 24px clamp(48px,6vw,76px);">
    <div style="display:flex; align-items:center; gap:9px; font-family:var(--font-heading); font-weight:600; font-size:13.5px;">
      <a href="index.html" class="pagehero-crumb" style="color:var(--text-muted); text-decoration:none; transition:color var(--dur-fast) var(--ease-standard);">Home</a>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" style="color:var(--text-faint);"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      <span style="color:var(--color-brand-press);">{{ crumb }}</span>
    </div>
    <span style="display:inline-block; margin-top:22px; font-family:var(--font-heading); font-weight:600; font-size:11.5px; letter-spacing:0.14em; text-transform:uppercase; color:var(--color-brand);">{{ eyebrow }}</span>
    <h1 style="font-family:var(--font-heading); font-weight:800; font-size:clamp(30px,4.6vw,50px); line-height:1.1; letter-spacing:-0.03em; color:var(--text-strong); margin:12px 0 0; max-width:820px;">{{ title }}</h1>
    <p style="font-family:var(--font-body); font-size:clamp(16px,2vw,18.5px); line-height:1.65; color:var(--text-body); max-width:680px; margin:18px 0 0;">{{ subtitle }}</p>
  </div>
</section>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:340},&quot;crumb&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;About Us&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;eyebrow&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;About HG&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;We are one of the LDI license holder companies in Pakistan&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;subtitle&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;HG Telecommunication (Pvt) Ltd was founded in 2022 and obtained its licence in 2023.&quot;,&quot;tsType&quot;:&quot;string&quot;}}"></script>
</body>
</html>
