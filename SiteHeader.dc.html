<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/hg-communication-design-system-e7295788-beb5-450f-a12b-213eea38d73b/styles.css">
</helmet>
<header style="position:sticky; top:0; z-index:50; background:rgba(255,255,255,0.88); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border-bottom:1px solid var(--border-subtle);">
  <div style="max-width:1200px; margin:0 auto; padding:0 24px; height:74px; display:flex; align-items:center; justify-content:space-between; gap:20px;">

    <a href="index.html" style="display:inline-flex; align-items:center; flex:0 0 auto;">
      <img src="assets/logo/hg-logo-lockup-light.png" alt="HG Telecommunication" style="height:34px; width:auto; display:block;">
    </a>

    <sc-if value="{{ isDesktop }}" hint-placeholder-val="{{ true }}">
      <div style="display:flex; align-items:center; gap:14px;">
        <nav style="display:flex; align-items:center; gap:2px; padding:5px; background:var(--neutral-50); border:1px solid var(--border-subtle); border-radius:999px;">
          <sc-for list="{{ leftItems }}" as="item" hint-placeholder-count="3">
            <a href="{{ item.href }}" style="{{ item.style }}" style-hover="{{ item.styleHover }}">{{ item.label }}</a>
          </sc-for>

          <div style="position:relative;" onMouseEnter="{{ openCompanies }}" onMouseLeave="{{ closeCompanies }}">
            <button type="button" style="{{ companiesStyle }}" style-hover="{{ companiesHover }}" onClick="{{ toggleCompanies }}">
              Companies
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="margin-left:-1px;"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
            </button>
            <sc-if value="{{ companiesOpen }}" hint-placeholder-val="{{ false }}">
              <div style="position:absolute; top:100%; left:50%; transform:translateX(-50%); width:236px; height:14px; z-index:60;"></div>
              <div style="position:absolute; top:calc(100% + 12px); left:50%; transform:translateX(-50%); min-width:236px; background:var(--surface-card); border:1px solid var(--border-subtle); border-radius:14px; box-shadow:0 12px 28px rgba(20,32,27,0.10), 0 4px 10px rgba(20,32,27,0.06); padding:8px; z-index:60;">
                <div style="position:absolute; top:-6px; left:50%; transform:translateX(-50%) rotate(45deg); width:12px; height:12px; background:var(--surface-card); border-left:1px solid var(--border-subtle); border-top:1px solid var(--border-subtle);"></div>
                <a href="LinkTechnology.dc.html" style="display:flex; align-items:center; gap:12px; padding:11px 12px; border-radius:10px; text-decoration:none;" style-hover="{{ dropHover }}">
                  <span style="display:inline-flex; align-items:center; justify-content:center; width:34px; height:34px; border-radius:9px; background:var(--color-brand-subtle); color:var(--color-brand-press); flex:0 0 auto;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 17H7A5 5 0 017 7h2M15 7h2a5 5 0 010 10h-2M8 12h8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                  </span>
                  <span style="display:flex; flex-direction:column; gap:1px;">
                    <span style="font-family:var(--font-heading); font-weight:600; font-size:14.5px; color:var(--text-heading);">Link Technology</span>
                    <span style="font-family:var(--font-body); font-size:12px; color:var(--text-muted);">Global voice & data carrier</span>
                  </span>
                </a>
                <a href="Wavecomm.dc.html" style="display:flex; align-items:center; gap:12px; padding:11px 12px; border-radius:10px; text-decoration:none;" style-hover="{{ dropHover }}">
                  <span style="display:inline-flex; align-items:center; justify-content:center; width:34px; height:34px; border-radius:9px; background:var(--color-brand-subtle); color:var(--color-brand-press); flex:0 0 auto;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 12a7 7 0 0114 0M2 12a10 10 0 0120 0M8 12a4 4 0 018 0M12 20v-4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                  </span>
                  <span style="display:flex; flex-direction:column; gap:1px;">
                    <span style="font-family:var(--font-heading); font-weight:600; font-size:14.5px; color:var(--text-heading);">Wavecomm Telecom</span>
                    <span style="font-family:var(--font-body); font-size:12px; color:var(--text-muted);">FTTH home & business internet</span>
                  </span>
                </a>
              </div>
            </sc-if>
          </div>

          <sc-for list="{{ rightItems }}" as="item" hint-placeholder-count="2">
            <a href="{{ item.href }}" style="{{ item.style }}" style-hover="{{ item.styleHover }}">{{ item.label }}</a>
          </sc-for>
        </nav>

        <a href="tel:+92512726552" style="display:inline-flex; align-items:center; gap:9px; height:46px; padding:0 20px; border-radius:999px; background:var(--color-brand); color:#fff; font-family:var(--font-heading); font-weight:600; font-size:14.5px; letter-spacing:0.01em; text-decoration:none; white-space:nowrap; box-shadow:var(--shadow-xs); transition:background var(--dur-fast) var(--ease-standard), box-shadow var(--dur-base) var(--ease-standard);" style-hover="{{ callHover }}">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 4h3l1.5 5-2 1.5a12 12 0 005 5l1.5-2 5 1.5v3a2 2 0 01-2 2A16 16 0 013 6a2 2 0 012-2z" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path></svg>
          +92 51 2726552
        </a>
      </div>
    </sc-if>

    <sc-if value="{{ isMobile }}" hint-placeholder-val="{{ false }}">
      <button type="button" onClick="{{ toggleMobile }}" aria-label="Menu" style="display:inline-flex; align-items:center; justify-content:center; width:46px; height:46px; border-radius:12px; background:var(--neutral-50); border:1px solid var(--border-subtle); color:var(--text-heading); cursor:pointer; flex:0 0 auto;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="{{ burgerPath }}" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      </button>
    </sc-if>
  </div>

  <sc-if value="{{ mobileMenuVisible }}" hint-placeholder-val="{{ false }}">
    <div style="border-top:1px solid var(--border-subtle); background:var(--surface-card); padding:14px 24px 24px;">
      <div style="display:flex; flex-direction:column; gap:4px; max-width:1200px; margin:0 auto;">
        <sc-for list="{{ mobileTop }}" as="item" hint-placeholder-count="3">
          <a href="{{ item.href }}" style="{{ item.mStyle }}">{{ item.label }}</a>
        </sc-for>
        <div style="margin:6px 0 2px; padding:0 4px; font-family:var(--font-heading); font-weight:700; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-faint);">Companies</div>
        <a href="LinkTechnology.dc.html" style="{{ mCompLink }}">Link Technology</a>
        <a href="Wavecomm.dc.html" style="{{ mCompWave }}">Wavecomm Telecom</a>
        <sc-for list="{{ mobileBottom }}" as="item" hint-placeholder-count="2">
          <a href="{{ item.href }}" style="{{ item.mStyle }}">{{ item.label }}</a>
        </sc-for>
        <a href="tel:+92512726552" style="margin-top:12px; display:inline-flex; align-items:center; justify-content:center; gap:9px; height:50px; border-radius:12px; background:var(--color-brand); color:#fff; font-family:var(--font-heading); font-weight:600; font-size:15px; text-decoration:none;">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M5 4h3l1.5 5-2 1.5a12 12 0 005 5l1.5-2 5 1.5v3a2 2 0 01-2 2A16 16 0 013 6a2 2 0 012-2z" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path></svg>
          Call +92 51 2726552
        </a>
      </div>
    </div>
  </sc-if>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:74},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;home&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;about&quot;,&quot;services&quot;,&quot;link-technology&quot;,&quot;wavecomm&quot;,&quot;careers&quot;,&quot;contact&quot;],&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { w: (typeof window !== 'undefined' ? window.innerWidth : 1200), mobileOpen: false, companiesOpen: false };
  componentDidMount() {
    this._onResize = () => this.setState({ w: window.innerWidth });
    window.addEventListener('resize', this._onResize);
  }
  componentWillUnmount() { window.removeEventListener('resize', this._onResize); if (this._closeTimer) clearTimeout(this._closeTimer); }
  navStyle(active) {
    return {
      display: 'inline-flex', alignItems: 'center', gap: '6px',
      padding: '9px 16px', borderRadius: '999px',
      fontFamily: 'var(--font-heading)', fontWeight: 600, fontSize: '14.5px',
      letterSpacing: '0.01em', textDecoration: 'none', whiteSpace: 'nowrap', cursor: 'pointer',
      border: 'none',
      color: active ? '#fff' : 'var(--text-body)',
      background: active ? 'var(--color-brand)' : 'transparent',
      transition: 'background var(--dur-fast) var(--ease-standard), color var(--dur-fast) var(--ease-standard)'
    };
  }
  navHover(active) {
    return active ? { background: 'var(--color-brand-hover)' } : { background: 'var(--green-50)', color: 'var(--color-brand-press)' };
  }
  mLink(active) {
    return {
      display: 'block', padding: '13px 14px', borderRadius: '11px',
      fontFamily: 'var(--font-heading)', fontWeight: 600, fontSize: '16px', textDecoration: 'none',
      color: active ? 'var(--color-brand-press)' : 'var(--text-heading)',
      background: active ? 'var(--color-brand-subtle)' : 'transparent'
    };
  }
  item(label, href, key) {
    const a = (this.props.active || 'home') === key;
    return { label, href, style: this.navStyle(a), styleHover: this.navHover(a), mStyle: this.mLink(a) };
  }
  renderVals() {
    const active = this.props.active || 'home';
    const isMobile = this.state.w < 920;
    const compActive = active === 'link-technology' || active === 'wavecomm';
    return {
      isDesktop: !isMobile,
      isMobile,
      mobileMenuVisible: isMobile && this.state.mobileOpen,
      companiesOpen: this.state.companiesOpen && !isMobile,
      burgerPath: this.state.mobileOpen ? 'M6 6l12 12M18 6L6 18' : 'M4 7h16M4 12h16M4 17h16',
      toggleMobile: () => this.setState(s => ({ mobileOpen: !s.mobileOpen })),
      openCompanies: () => { if (this._closeTimer) { clearTimeout(this._closeTimer); this._closeTimer = null; } this.setState({ companiesOpen: true }); },
      closeCompanies: () => { if (this._closeTimer) clearTimeout(this._closeTimer); this._closeTimer = setTimeout(() => { this._closeTimer = null; this.setState({ companiesOpen: false }); }, 280); },
      toggleCompanies: () => { if (this._closeTimer) { clearTimeout(this._closeTimer); this._closeTimer = null; } this.setState(s => ({ companiesOpen: !s.companiesOpen })); },
      leftItems: [this.item('Home', 'index.html', 'home'), this.item('About', 'About.dc.html', 'about'), this.item('Services', 'Services.dc.html', 'services')],
      rightItems: [this.item('Careers', 'Careers.dc.html', 'careers'), this.item('Contact', 'Contact.dc.html', 'contact')],
      mobileTop: [this.item('Home', 'index.html', 'home'), this.item('About', 'About.dc.html', 'about'), this.item('Services', 'Services.dc.html', 'services')],
      mobileBottom: [this.item('Careers', 'Careers.dc.html', 'careers'), this.item('Contact', 'Contact.dc.html', 'contact')],
      companiesStyle: this.navStyle(compActive),
      companiesHover: this.navHover(compActive),
      mCompLink: this.mLink(active === 'link-technology'),
      mCompWave: this.mLink(active === 'wavecomm'),
      dropHover: { background: 'var(--neutral-50)' },
      callHover: { background: 'var(--color-brand-hover)', boxShadow: 'var(--shadow-brand)' }
    };
  }
}
</script>
</body>
</html>
