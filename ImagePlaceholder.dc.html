<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="{{ containerStyle }}">
  <div style="position:absolute; inset:0; background-image:radial-gradient(circle, {{ dotColor }} 1.4px, transparent 1.5px); background-size:22px 22px; opacity:0.5;"></div>
  <div style="position:relative; display:flex; flex-direction:column; align-items:center; gap:11px; padding:28px; text-align:center;">
    <span style="display:inline-flex; align-items:center; justify-content:center; width:52px; height:52px; border-radius:13px; background:{{ iconBg }}; color:{{ accent }};">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M4 5h16a1 1 0 011 1v12a1 1 0 01-1 1H4a1 1 0 01-1-1V6a1 1 0 011-1zM3 16l5-5 4 4 3-3 6 6M16 9.5a1.5 1.5 0 100-3 1.5 1.5 0 000 3z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"></path></svg>
    </span>
    <span style="font-family:var(--font-heading); font-weight:600; font-size:14.5px; color:{{ labelColor }}; letter-spacing:-0.01em; max-width:240px;">{{ label }}</span>
    <span style="font-family:var(--font-heading); font-weight:600; font-size:10.5px; letter-spacing:0.14em; text-transform:uppercase; color:{{ accent }}; opacity:0.75;">Image placeholder</span>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:520,&quot;height&quot;:320},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Add an image&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;aspect&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;16/10&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;tone&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;light&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;green&quot;,&quot;dark&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;radius&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;16px&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;minHeight&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;auto&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const tone = this.props.tone || 'light';
    const green = tone === 'green';
    const dark = tone === 'dark';
    return {
      label: this.props.label || 'Add an image',
      containerStyle: {
        position: 'relative', width: '100%',
        aspectRatio: this.props.aspect || '16/10',
        minHeight: this.props.minHeight || 'auto',
        background: dark ? 'rgba(255,255,255,0.04)' : green ? 'var(--color-brand-subtle)' : 'var(--neutral-100)',
        border: dark ? '1px dashed rgba(255,255,255,0.20)' : green ? '1px dashed rgba(0,168,80,0.40)' : '1px dashed var(--border-default)',
        borderRadius: this.props.radius || '16px',
        overflow: 'hidden',
        display: 'flex', alignItems: 'center', justifyContent: 'center'
      },
      dotColor: dark ? 'rgba(255,255,255,0.10)' : green ? 'rgba(0,168,80,0.16)' : 'rgba(11,42,26,0.07)',
      iconBg: dark ? 'rgba(255,255,255,0.08)' : green ? 'rgba(0,168,80,0.14)' : 'var(--neutral-0)',
      accent: dark ? 'var(--green-300)' : green ? 'var(--color-brand-press)' : 'var(--text-faint)',
      labelColor: dark ? 'var(--text-on-dark)' : green ? 'var(--color-brand-press)' : 'var(--text-muted)'
    };
  }
}
</script>
</body>
</html>
