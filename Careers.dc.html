<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/hg-communication-design-system-e7295788-beb5-450f-a12b-213eea38d73b/styles.css">
  <style>*{ box-sizing:border-box; } body{ margin:0; background:var(--surface-card); }</style>
</helmet>
<div style="font-family:var(--font-body); color:var(--text-body); background:var(--surface-card);">
  <dc-import name="SiteHeader" active="careers" hint-size="100%,74px"></dc-import>
  <dc-import name="PageHero" crumb="Careers" eyebrow="Careers" title="Get in touch with us" subtitle="We&rsquo;re always glad to hear from talented people and prospective partners. Reach us at our offices or send an enquiry below." hint-size="100%,340px"></dc-import>

  <section style="background:var(--surface-card);">
    <div style="max-width:1200px; margin:0 auto; padding:clamp(40px,5vw,56px) 24px 0;">
      <div style="display:flex; flex-wrap:wrap; align-items:center; gap:16px; background:var(--color-brand-subtle); border:1px solid rgba(0,168,80,0.25); border-radius:16px; padding:22px 26px;">
        <span style="display:inline-flex; align-items:center; justify-content:center; width:46px; height:46px; border-radius:12px; background:var(--color-brand); color:#fff; flex:0 0 auto;"><svg width="23" height="23" viewBox="0 0 24 24" fill="none"><path d="M17 20v-2a4 4 0 00-4-4H7a4 4 0 00-4 4v2M10 10a3.5 3.5 0 100-7 3.5 3.5 0 000 7zM21 20v-2a4 4 0 00-3-3.85" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path></svg></span>
        <div style="flex:1 1 320px;">
          <div style="font-family:var(--font-heading); font-weight:700; font-size:17px; color:var(--text-heading);">No roles are published right now</div>
          <div style="font-family:var(--font-body); font-size:14.5px; color:var(--text-body); margin-top:3px;">We&rsquo;d still love to hear from you — send your details below and we&rsquo;ll be in touch when something opens up.</div>
        </div>
      </div>
    </div>
  </section>

  <dc-import name="GetInTouch" hint-size="100%,760px"></dc-import>
  <dc-import name="SiteFooter" hint-size="100%,560px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900}}"></script>
</body>
</html>
